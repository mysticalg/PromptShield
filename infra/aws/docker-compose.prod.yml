services:
  nginx:
    image: nginx:1.29-alpine
    depends_on:
      - api
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/promptshield.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 4000
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    command: ["node", "apps/api/dist/apps/api/src/worker.js"]
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: promptshield
      POSTGRES_USER: promptshield
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - promptshield-postgres:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - promptshield-redis:/data
    restart: unless-stopped

volumes:
  promptshield-postgres:
  promptshield-redis:

