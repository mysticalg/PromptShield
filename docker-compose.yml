services:
  postgres:
    image: postgres:16-alpine
    container_name: promptshield-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: promptshield
      POSTGRES_USER: promptshield
      POSTGRES_PASSWORD: promptshield
    ports:
      - "${PROMPTSHIELD_POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: promptshield-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${PROMPTSHIELD_REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
